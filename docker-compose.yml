services:
  # ═══════════════════════════════════════════════════════════════
  # Open WebUI - Chat Interface
  # ═══════════════════════════════════════════════════════════════
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - CHROMA_ENABLED=true
      - CHROMA_URL=http://chroma:8000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-llama3.2}
      - WEBUI_NAME=${WEBUI_NAME:-AI-Stack}
      - WEBUI_URL=http://localhost:3000
    volumes:
      - openwebui-data:/app/backend/data
      - openwebui-models:/app/backend/data/models
    restart: unless-stopped
    depends_on:
      - chroma
    networks:
      - ai-network

  # ═══════════════════════════════════════════════════════════════
  # ChromaDB - Vector Database for RAG
  # ═══════════════════════════════════════════════════════════════
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chroma
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=${CHROMA_TELEMETRY:-false}
      - ALLOWED_ORIGINS=${CHROMA_ORIGINS:-http://localhost:3000}
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped
    networks:
      - ai-network

  # ═══════════════════════════════════════════════════════════════
  # Ollama - Local LLM Runtime (optional, run on host)
  # ═══════════════════════════════════════════════════════════════
  # Uncomment if you want Ollama in Docker instead of host
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - ai-network
  #   # For Apple Silicon
  #   platform: linux/arm64

# ═══════════════════════════════════════════════════════════════
# Volumes - Persistent Data
# ═══════════════════════════════════════════════════════════════
volumes:
  openwebui-data:
    driver: local
  openwebui-models:
    driver: local
  chroma-data:
    driver: local
  # ollama-data:
  #   driver: local

# ═══════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════
networks:
  ai-network:
    driver: bridge
